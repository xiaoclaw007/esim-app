<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating... — GlobalSIM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #4F46E5;
            --primary-light: #EEF2FF;
            --accent: #06B6D4;
            --text: #1E293B;
            --text-light: #64748B;
            --bg-gray: #F8FAFC;
            --border: #E2E8F0;
            --error: #EF4444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: var(--text); line-height: 1.6; background: var(--bg-gray);
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .auth-box {
            text-align: center; padding: 40px;
        }
        .spinner {
            width: 48px; height: 48px;
            border: 4px solid var(--border); border-top-color: var(--primary);
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        p { color: var(--text-light); font-size: 15px; }
        .error-box {
            display: none; background: #FEF2F2; border: 1px solid #FECACA;
            color: #DC2626; padding: 16px 24px; border-radius: 12px;
            margin-top: 24px; font-size: 14px; max-width: 400px;
        }
        .error-box a { color: var(--primary); font-weight: 600; }
    </style>
</head>
<body>

<div class="auth-box">
    <div class="spinner" id="spinner"></div>
    <h2 id="title">Signing you in...</h2>
    <p id="subtitle">Please wait while we complete authentication.</p>
    <div class="error-box" id="error-box"></div>
</div>

<script src="../js/auth.js"></script>
<script>
    (async function() {
        const params = new URLSearchParams(window.location.search);
        const token = params.get('access_token');
        const error = params.get('error');

        if (error) {
            showError('Authentication failed: ' + error + '. <a href="/login.html">Try again</a>');
            return;
        }

        if (!token) {
            showError('No authentication token received. <a href="/login.html">Try logging in again</a>');
            return;
        }

        // Store the access token
        accessToken = token;

        try {
            // Fetch the current user
            await fetchCurrentUser();

            if (currentUser) {
                window.location.href = '/dashboard.html';
            } else {
                showError('Failed to load your profile. <a href="/login.html">Try again</a>');
            }
        } catch (e) {
            showError('Something went wrong. <a href="/login.html">Try again</a>');
        }
    })();

    function showError(html) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('title').textContent = 'Authentication Error';
        document.getElementById('subtitle').textContent = '';
        const errorBox = document.getElementById('error-box');
        errorBox.innerHTML = html;
        errorBox.style.display = 'block';
    }
</script>

</body>
</html>
